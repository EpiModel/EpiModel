url: https://epimodel.github.io/EpiModel/

template:
  bootstrap: 5
  bslib:
    base_font:
      google: "Atkinson Hyperlegible"
    heading_font:
      google: "Open Sans"
    primary: "#1a6b54"
    link-color: "#1a6b54"
    navbar-bg: "#4682B4"
    navbar-dark-color: "#ffffff"
    navbar-dark-hover-color: "#ffffff"
  includes:
    in_header: |
      <link rel="icon" href="https://epimodel.github.io/sismid/images/movie.gif" type="image/gif">

home:
  links:
    - text: "NME Course Materials"
      href: "https://epimodel.github.io/sismid/"
    - text: "EpiModel Gallery"
      href: "https://epimodel.github.io/EpiModel-Gallery/"

navbar:
  bg: dark
  structure:
    left: [intro, reference, articles, news]
    right: [search, github]
  components:
    github:
      icon: fab fa-github
      href: https://github.com/EpiModel/EpiModel
      aria-label: GitHub

articles:
  - title: "Getting Started"
    contents:
      - Intro
  - title: "Model Configuration"
    contents:
      - model-parameters
      - network-objects
      - attributes-and-summary-statistics

reference:
  - title: "Package Overview"
    contents:
      - EpiModel-package

  - title: "Model Inputs"
    desc: >
      Specify epidemic parameters, initial conditions, and control
      settings for each model class.
    contents:
      - param.dcm
      - param.icm
      - param.net
      - init.dcm
      - init.icm
      - init.net
      - control.dcm
      - control.icm
      - control.net

  - title: "Epidemic Simulation"
    desc: >
      Run deterministic compartmental models, stochastic individual
      contact models, or stochastic network models.
    contents:
      - dcm
      - icm
      - netsim

  - title: "Network Model Setup & Estimation"
    desc: >
      Create and configure network objects, estimate ERGM/TERGM-based
      network models from target statistics, diagnose model fit, and
      compute dissolution coefficients. These functions support the
      additional estimation step required by network models before
      simulation with netsim().
    contents:
      - network_initialize
      - multilayer
      - get_vertex_attribute
      - set_vertex_attribute
      - netest
      - netdx
      - dissolution_coefs
      - update_dissolution
      - trim_netest
      - check_degdist_bal

  - title: "Simulation Output"
    desc: >
      Extract, transform, merge, and truncate simulation results.
      Convert to data frames, derive new epi statistics, subset
      simulations, and create restart checkpoints.
    contents:
      - as.data.frame.dcm
      - as.data.frame.icm
      - as.data.frame.netdx
      - as.epi.data.frame
      - get_sims
      - mutate_epi
      - truncate_sim
      - merge.icm
      - merge.netsim
      - get_network
      - get_nwstats
      - get_nwparam
      - get_param_set
      - get_attr_history
      - make_restart_point

  - title: "Transmission & Reachability Analysis"
    desc: >
      Extract transmission matrices, construct phylogenies from
      transmission trees, and trace forward and backward reachable
      nodes through cumulative contact histories.
    contents:
      - get_transmat
      - set_transmat
      - is.transmat
      - as.network.transmat
      - as.phylo.transmat
      - reachable-nodes
      - get_adj_list
      - get_subnet_adj_list
      - get_connected_nodes

  - title: "Visualization"
    desc: >
      Plot epidemic trajectories, network diagnostics, transmission
      trees, and epi data frames. Includes ggplot2 extensions and an
      interactive Shiny-based explorer.
    contents:
      - plot.dcm
      - plot.icm
      - plot.netsim
      - plot.netdx
      - plot.transmat
      - plot.epi.data.frame
      - comp_plot
      - geom_bands
      - epiweb
      - brewer_ramp
      - color_tea

  - title: "Print & Summary Methods"
    contents:
      - print.dcm
      - print.icm
      - print.netsim
      - print.netdx
      - summary.dcm
      - summary.icm
      - summary.netsim
      - summary.netest
      - print_nwstats_table
      - make_stats_table

  - title: "Scenarios & Sensitivity Analysis"
    desc: >
      Build parameter scenarios for batch sensitivity analyses, convert
      between list and tabular parameter formats, and generate random
      parameter draws.
    contents:
      - create_scenario_list
      - use_scenario
      - update_params
      - param.net_from_table
      - param.net_to_table
      - param_random
      - generate_random_params
      - format_param

  - title: "Extension API: Module Framework"
    desc: >
      Core framework for building custom network model modules with
      arbitrary disease states, demographics, and interventions. Manage
      module registration, timestep control, demographic flows, and
      simulation execution.
    contents:
      - create_dat_object
      - simulate_dat
      - get_modules
      - set_modules
      - remove_modules
      - make_module_list
      - get_current_timestep
      - set_current_timestep
      - increment_timestep
      - get_args
      - arrive_nodes
      - depart_nodes
      - record_raw_object

  - title: "Extension API: State Accessors"
    desc: >
      Get, set, and manage node-level attributes, epidemic trackers,
      parameters, control settings, and initial conditions on the
      internal dat simulation state object.
    contents:
      - net-accessor
      - get_attr_prop
      - auto_update_attr
      - overwrite_attrs
      - delete_attr
      - epi_trackers
      - record_attr_history
      - unique_id-tools
      - is_active_posit_ids
      - is_active_unique_ids

  - title: "Extension API: Edgelist & Partnership Queries"
    desc: >
      Query the current network state within modules: extract edgelists,
      look up partnerships and degree, identify discordant pairs, and
      manage cumulative edgelist tracking.
    contents:
      - get_edgelist
      - get_edgelists_df
      - discord_edgelist
      - get_discordant_edgelist
      - get_degree
      - get_partners
      - get_cumulative_edgelist
      - get_cumulative_edgelists_df
      - get_cumulative_degree
      - as_cumulative_edgelist
      - update_cumulative_edgelist
      - dedup_cumulative_edgelist
      - as_tibble_edgelist
      - edgelist_censor

  - title: "Extension API: Network Operations"
    desc: >
      Initialize, resimulate, and summarize networks within modules.
      Manage network objects, vertices, edges, and attribute
      synchronization between dat and network representations.
    contents:
      - init_nets
      - resim_nets
      - sim_nets_t1
      - summary_nets
      - set_network
      - get_network_attributes
      - add_vertices
      - delete_vertices
      - delete_edges
      - copy_datattr_to_nwattr
      - copy_nwattr_to_datattr

  - title: "Built-in DCM ODE Systems"
    desc: >
      Built-in ODE model functions for deterministic compartmental models
      (SI, SIR, SIS; one-group and two-group; open and closed populations).
    contents:
      - dcm.mods
      - saveout.dcm
      - verbose.dcm

  - title: "Built-in ICM Modules"
    desc: >
      Default module functions for stochastic individual contact models
      (one-group and two-group/bipartite).
    contents:
      - initialize.icm
      - infection.icm
      - infection.icm.bip
      - recovery.icm
      - recovery.icm.bip
      - arrivals.icm
      - arrivals.icm.bip
      - departures.icm
      - departures.icm.bip
      - prevalence.icm
      - prevalence.icm.bip
      - init_status.icm
      - saveout.icm
      - verbose.icm
      - modules.icm
      - test_icm

  - title: "Built-in Network Modules"
    desc: >
      Default module functions for stochastic network models
      (one-group and two-group).
    contents:
      - initialize.net
      - infection.net
      - infection.2g.net
      - recovery.net
      - recovery.2g.net
      - arrivals.net
      - arrivals.2g.net
      - departures.net
      - departures.2g.net
      - nwupdate.net
      - edges_correct
      - prevalence.net
      - init_status.net
      - saveout.net
      - verbose.net
      - process_out.net
      - modules.net
      - test_net

  - title: "Custom ERGM Terms"
    desc: >
      Custom exponential-family random graph model terms provided by
      EpiModel for use in network model formulas.
    contents:
      - InitErgmTerm.fuzzynodematch
      - InitErgmTerm.absdiffby
      - InitErgmTerm.absdiffnodemix
      - get_formula_term_attr
      - get_network_term_attr

  - title: "Utilities"
    desc: >
      Internal helpers, input validation, and low-level support functions.
    contents:
      - crosscheck.dcm
      - crosscheck.icm
      - crosscheck.net
      - ssample
      - padded_vector
      - apportion_lr
      - mcat
      - idgroup
      - update_list
      - common_updater
      - check_attr_lengths
      - check_end_horizon_control
      - trigger_end_horizon
      - netsim_cond_msg
      - netsim_error_logger
      - tedgelist_to_toggles
      - toggles_to_diss_stats
